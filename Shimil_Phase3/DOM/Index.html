<!DOCTYPE html>
<html>
<head>
  <title>DOM Manipulation</title>

  <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        }

        body{
            background-color: rgb(20, 20, 20);
            color: aliceblue;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content:center;
            align-items: center;
            flex-direction: column;
        }

        .title1, .title2, .title3{
            background-color: aliceblue;
            width: 350px;
            color: rgb(42, 40, 40);
            border-radius: 30px;
            border: 2px solid rgb(51, 255, 0);
            margin-top: 85px;
            padding-bottom: 30px;
            text-align: center;
            
        }

        h1 {
        margin-bottom: 10px;
        color: rgb(225, 213, 213);
        }

        hr {
        border: none;
        border-top: 3px solid #33ff3d;
        height: 0;
        width: 100%;
        }

        button {
        margin: 10px 0;
        cursor: pointer;
        background-color: rgb(57, 54, 54);
        color: rgb(42, 254, 0);
        }



</style>
</head>
<body>

<h1>DOM Manipulation</h1>
<hr>
<div class="title1">
    <h2>Dynamic List</h2>
    <input type="text" id="listInput" placeholder="Enter item">
    <button onclick="addItem()">Add</button>
    <button onclick="clearList()">Clear All</button>
    <ul id="myList"></ul>
</div>

<div class="title2">
    <h2>To-Do List</h2>

    <input type="text" id="todoInput" placeholder="Enter task">
    <button onclick="addTask()">Add Task</button>
    <ul id="todoList"></ul>
</div>


<div class="title3">
    <h2>Toggle Button</h2>
    <button onclick="toggleMessage()">Show / Hide Message</button>
    <p id="toggleMsg" style="display:none;">Hello! This is the hidden message.</p>

</div>
  
<script src="script.js"></script>

</body>
</html>
