<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event sample</title>

    <style>
    body {
        display: flex;
        flex-direction: column; 
        
        background-color: rgb(255, 255, 255);
        align-items: center;
        justify-content: flex-start; 
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        padding: 20px;
    }

    .title, .title1, .title2 {
        width: 280px;
        color: rgb(255, 0, 0);
        border: 2px solid rgb(255, 0, 0);
        border-radius: 20px;
        margin-top: 20px;
        padding: 20px;
        text-align: center;
        background-color: white;
    }

    h2 {
        margin-bottom: 10px;
        color: rgb(255, 0, 0);
    }

    button {
        margin: 10px 0;
        cursor: pointer;
    }

    input {
        margin: 10px 0;
        padding: 5px;
    }
</style>

</head>
<body>

<h2> Event Handling </h2>

<div class="title">
    <h3> Button Click - Change Text</h3>

    <button id="myBtn">Click Me</button>
    <p id="clickText">Click the button to change this text.</p>
</div>
<br>
<div class="title1">
    <h3> Input Typing - Live Preview</h3>

    <input type="text" id="liveInput" placeholder="Type something...">
    <p><span id="preview">type something</span></p>
</div>

<div class="title2">
    <h3>Form Submit - Prevent Default and Validate</h3>
    <form id="myForm">
        <input type="text" id="nameInput" placeholder="Enter your name">
        <button type="submit">Submit</button>
    </form>
    <p id="formMsg"></p>
</div>

<script src="script.js"></script>

</body>
</html>
