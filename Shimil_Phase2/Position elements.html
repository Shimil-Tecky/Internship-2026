<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position element</title>

    <style>
        /* 1. Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* Better sizing calculation */
        }

        body {
            display: flex;
            flex-direction: column; /* Stack elements vertically */
            align-items: center;    /* Center elements horizontally */
            justify-content: flex-start; 
            min-height: 100vh;
            background-color: #000; /* Set background only here */
            color: white;           /* Default text color */
            padding-top: 80px;      /* Space for fixed navbar */
            font-family: sans-serif;
        }

        /* 2. Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: #111;
            padding: 20px;
            text-align: right;
            z-index: 1000;
        }
        nav a {
            color: azure;
            margin: 0 1rem;
            text-decoration: none;
        }

        /* 3. Section Containers */
        h3 { margin: 20px 0 10px; }

        .static-box {
            background-color: tomato;
            padding: 10px;
            margin-bottom: 5px;
            width: 250px;
        }

        .relative-parent {
            background-color: #eee;
            color: #333;
            padding: 10px;
            width: 300px;
            height: 80px;
        }

        .relative-box {
            position: relative;
            top: 15px;
            left: 30px;
            background-color: steelblue;
            padding: 10px;
            width: 200px;
        }

        .absolute-parent {
            position: relative;
            background-color: #eee;
            color: #333;
            width: 300px;
            height: 120px;
        }

        .absolute-box {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: orange;
            padding: 8px 12px;
            font-size: 13px;
        }

        /* 4. The Image with Badge - The Main Goal */
        .image-container {
            position: relative;      /* Anchor for the badge */
            margin-top: 50px;
            display: inline-block;
        }

        .Img {
            display: block;
            width: 250px;            /* Set a fixed size for testing */
            height: auto;
            border: 2px solid white;
        }

        .Badge {
            position: absolute;
            top: -10px;              /* Pulls it slightly above the image */
            right: -10px;            /* Pulls it slightly right of the image */
            background-color: red;
            color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;           /* Centers "New" inside the circle */
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#about">About</a>
        <a href="#Contact">Contact</a>
        <a href="#Services">Services</a>
    </nav>

    <h3>position: absolute</h3>
    <div class="absolute-parent">
        Parent box 
        <div class="absolute-box">Absolute Box</div>
    </div>

    <h3>position: static</h3>
    <div class="static-box">Static Box 1</div>
    <div class="static-box">Static Box 2</div>

    <h3>position: relative</h3>
    <div class="relative-parent">
        <div class="relative-box">Relative Box</div>
    </div>

    <div class="image-container">
        <img src="./Shimil_Phase2/Img/Nothing.webp" alt="Sample-Img" class="Img">
        <span class="Badge">New</span>
    </div>

</body>
</html>
