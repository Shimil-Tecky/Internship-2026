<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Properties</title>
    <style>
         body {
            background-color: rgb(0, 0, 0);
            color: azure;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .block {
            display: block;
            background-color: #3498db;
            color: white;
            padding: 10px;
            margin: 10px 0;
            width: 200px;
        }

        .inline {
            display: inline;
            background-color: #e74c3c;
            color: white;
            padding: 5px 10px;
            margin: 5px;
        }

        .inline-block {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 10px;
            margin: 10px 5px;
            width: 150px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 10px 0;
        }

        .grid-item {
            background-color: #9b59b6;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .hidden {
            display: none;
            background-color: #95a5a6;
        }

        
    </style>
</head>
<body>
     <h1>Display Properties</h1>

    <h2>Block Display</h2>
    <div class="block">Football</div>
    <div class="block">Cricket</div>

    <h2>Inline Display</h2>
    <span class="inline">Messi</span>
    <span class="inline">Ronaldo</span>
    <span class="inline">Neymar</span>

    <h2>Inline-Block Display</h2>
    <div class="inline-block">Kohli</div>
    <div class="inline-block">Sachin</div>
    
    <h2>Grid Display</h2>
    <div class="grid">
        <div class="grid-item">India</div>
        <div class="grid-item">Australia</div>
        <div class="grid-item">England</div>
        <div class="grid-item">West Indies</div>
        <div class="grid-item">South Africa</div>
        <div class="grid-item">New Ziland</div>
    </div>

    <h2>Hidden (display: none)</h2>
    <div class="hidden">This element is hidden</div>
</body>
</html>
