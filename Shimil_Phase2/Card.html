<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Creation</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .body{
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            background-color: beige;
            padding: 20px;
        }

        .card{
            background-color: rgb(199, 236, 236);
            border-radius: 8px;
            max-width: 300px;
            margin: 200px auto;
            overflow: hidden;
        }
        .card-img{
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .card-content{
            padding: 30px;
        }
        .card-title{
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            color: black;
        }
        .card-para{
            font-size: 14px;
            color: black;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .card-button {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .card-button:hover {
            background-color: #0056b3;
        }
    

    </style>
</head>
<body>
    <div class="card">
        <img src="./Img/hippie2.png" class="card-img">
        <div class="card-content">
            <h2 class="card-title">NIKE</h2>
            <p class="card-para">Welcome to NIKE Webpage.</p>
            <button class="card-button">MORE INFO</button>
        </div>
    </div>
    
</body>
</html>
