<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body style="background-color: rgb(90, 89, 89); color:aliceblue" topmargin="10%">

    <form action="" style="text-align: center;">
    <b>Name:</b>
    <input type="text" placeholder="Name" id="name"><br><br>
    <b>Email ID:</b>
    <input type="email" placeholder="Email" id="email"><br><br>
    <b>Password</b>
    <input type="password" placeholder="Password" id="password"><br><br>
    <b>Gender</b>
    <input type="radio" name="Gender" id="gender">Male
    <input type="radio" name="Gender" id="gender">Female<br><br>
    <b>Hobbies</b>
    <input type="text" placeholder="Hobbies" id="Hobbies"><br><br>
    <input type="submit" name="action" value="Save">
    
   </form>
</body>
</html>
